const fmtDateShort = (s) => new Date(s + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });

const formatPhone = (v) => {
  const d = v.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 2) return d;
  if (d.length <= 7) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
};
const formatCPF = (v) => {
  const d = v.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 3) return d;
  if (d.length <= 6) return `${d.slice(0,3)}.${d.slice(3)}`;
  if (d.length <= 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
  return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
};
const isValidPhone = (v) => v.replace(/\D/g, '').length === 11;

const fmtDateTime = (s) => {
  if (!s) return '—';
  return new Date(s).toLocaleString('pt-BR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
};

const maskCPF = (v) => {
  const d = String(v || '').replace(/\D/g, '');
  if (d.length !== 11) return '•••.•••.•••-••';
  return `•••.${d.slice(3, 6)}.${d.slice(6, 9)}-••`;
};

const maskPhone = (v) => {

};

const AdminFinance = ({ quotations = MOCK_QUOTATIONS }) => {
  const [query, setQuery] = useState('');
  const [date, setDate] = useState('');

  const entries = quotations
    .filter(q => q.total != null && q.status !== 'recusada')
    .map((q) => {
      const received = q.status === 'finalizada';
      return {
        id: q.id,
        protocol: q.protocolId || q.id,
        project: q.project,
        client: q.client,
        house: q.rhName,
        status: q.status,
        movement: received ? 'Recebido' : 'A receber',
        date: received ? (q.closedAt?.split('T')[0] || q.returnDate) : q.pickupDate,
        dueDate: q.returnDate,
        amount: q.total || 0,
      };
    })
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const receivedTotal = entries.filter(e => e.movement === 'Recebido').reduce((s, e) => s + e.amount, 0);
  const receivableTotal = entries.filter(e => e.movement === 'A receber').reduce((s, e) => s + e.amount, 0);
  const billedTotal = receivedTotal + receivableTotal;
  const avgTicket = entries.length ? billedTotal / entries.length : 0;
  const conversionBase = quotations.filter(q => q.status !== 'aguardando').length || 1;
  const conversion = Math.round((entries.length / conversionBase) * 100);
  const today = new Date().toISOString().split('T')[0];
  const overdue = entries.filter(e => e.movement === 'A receber' && e.dueDate < today).reduce((s, e) => s + e.amount, 0);

  const normalizedQuery = query.trim().toLowerCase();
  const filtered = entries.filter((entry) => {
    const haystack = `${entry.id} ${entry.protocol} ${entry.project} ${entry.client} ${entry.house} ${entry.date} ${entry.dueDate}`.toLowerCase();
    const matchesQuery = !normalizedQuery || haystack.includes(normalizedQuery);
    const matchesDate = !date || entry.date === date || entry.dueDate === date;
    return matchesQuery && matchesDate;
  });

  const monthly = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'].map((label, index) => ({
    label,
    value: Math.round((billedTotal / 6) * (0.72 + index * 0.06)),

  const maxMonth = Math.max(...monthly.map(m => m.value), 1);

  const exportStatement = () => {
    if (!filtered.length) return;

      ...filtered.map(e => [e.date, e.dueDate, e.id, e.protocol, e.client, e.project, e.house, e.movement, e.status, e.amount]),
    ];
    const csv = rows.map(row => row.map(cell => {
      let text = String(cell ?? '');
      if (/^[=+\-@]/.test(text)) text = `'${text}`;
      return `"${text.replaceAll('"', '""')}"`;
    }).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `extrato-financeiro-cena-${date || 'filtrado'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const kpis = [
    { label: 'Faturamento previsto', value: currency(billedTotal), delta: `${entries.length} movimentos`, color: '#ff7a2e' },
    { label: 'Recebido', value: currency(receivedTotal), delta: 'entradas finalizadas', color: '#8ee37c' },
    { label: 'A receber', value: currency(receivableTotal), delta: overdue ? `${currency(overdue)} em atraso` : 'sem atraso crítico', color: '#e8c468' },
    { label: 'Ticket médio', value: currency(avgTicket), delta: 'por locação faturada', color: '#6ba8ff' },
    { label: 'Conversão em receita', value: `${conversion}%`, delta: 'cotações com valor', color: '#8ee37c' },
    { label: 'Inadimplência simulada', value: billedTotal ? `${Math.round((overdue / billedTotal) * 100)}%` : '0%', delta: 'base demonstrativa', color: '#ff6b6b' },
  ];

  return (

      <div className="mb-8 fade-up">
        <div className="eyebrow text-amber-glow mb-2">Financeiro · Cinestúdio SP</div>

          <div key={k.label} style={{ animationDelay: `${i * 0.04}s` }} className="fade-up bg-ink-900 border border-ink-700 rounded-2xl p-5 relative overflow-hidden">

            <span className="eyebrow text-ink-400">2026</span>

          <div className="flex items-end justify-between gap-2 h-44">
            {monthly.map((m, i) => (

          <div className="space-y-4">
            {[
              ['Receita recorrente', billedTotal ? 'alta' : 'baixa', billedTotal ? 86 : 18],
              ['Recebíveis no prazo', overdue ? 'atenção' : 'saudável', overdue ? 61 : 94],
              ['Ticket médio', avgTicket > 12000 ? 'premium' : 'moderado', avgTicket > 12000 ? 88 : 55],

              <button onClick={exportStatement} disabled={!filtered.length} className={`px-4 py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 ${filtered.length ? 'btn-primary' : 'btn-ghost opacity-60 cursor-not-allowed'}`}>

        <div className="overflow-x-auto">

            <tbody className="divide-y divide-ink-800">
              {filtered.map(entry => (
                <tr key={`${entry.id}-${entry.movement}`} className="hover:bg-ink-800/40 transition-colors">

  const text = String(value ?? '').replace(/[\u0000-\u001F\u007F]/g, ' ').trim().slice(0, max);
  return text || fallback;
};

const maskName = (value) => {
  const parts = safeText(value, 80, 'Usuário').split(/\s+/).filter(Boolean);
  if (parts.length <= 1) return parts[0] || 'Usuário';
  return `${parts[0]} ${parts.slice(1).map(part => `${part.charAt(0)}.`).join(' ')}`;
};

const maskEmail = (value) => {
  const [user, domain] = String(value || '').split('@');
  if (!user || !domain) return '';
  return `${user.slice(0, 2)}***@${domain}`;
};

};

  consents: profile.consents || {},
});

const sanitizeVerificationForStorage = (verification = {}) => ({
  level: verification.level,
  cpf: '',
  phone: '',
  phoneVerified: Boolean(verification.phoneVerified),
  documentVerified: Boolean(verification.documentVerified),
  validatedBy: verification.validatedBy || [],
});

const sanitizeQuotationForStorage = (quotation = {}) => ({
  ...quotation,
  requesterVerification: sanitizeVerificationForStorage(quotation.requesterVerification),
  driver: quotation.driver ? { ...quotation.driver, phone: '' } : quotation.driver,
});

const sanitizeStateForLocalStorage = ({ cart, quotations, equipment, team, profile, auditLog }) => ({
  cart,
  quotations: (quotations || []).map(sanitizeQuotationForStorage),
  equipment,
  team: (team || []).map(member => ({ ...member, email: maskEmail(member.email) })),
  profile: sanitizeProfileForStorage(profile),
  auditLog: (auditLog || []).slice(0, 200),
});

const parseStorage = (store, key) => {
  try {
    const raw = store?.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch (err) {
    return null;
  }
};

const loadInteractiveState = () => {
  const sessionState = parseStorage(sessionStorage, SESSION_STORAGE_KEY);
  if (sessionState) return sessionState;
  const persistedState = parseStorage(localStorage, STORAGE_KEY);
  if (!persistedState) return null;
  return { ...persistedState, profile: { ...defaultProfile, ...(persistedState.profile || {}) } };
};

const makeEquipmentId = (name) => {
  const slug = name
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 28);
  return `eq-${slug || 'item'}-${Date.now().toString(36)}`;
};

const addHoursIso = (hours) => new Date(Date.now() + hours * 60 * 60 * 1000).toISOString();

const buildApprovals = (items, equipmentList) => {
  const requested = items.map(item => equipmentList.find(eq => eq.id === item.id)).filter(Boolean);
  return QUOTE_AREAS
    .filter(area => requested.some(eq => area.cats.includes(eq.cat)))
    .reduce((acc, area) => ({
      ...acc,
      [area.id]: { label: area.label, owner: area.owner, approved: false },
    }), {});
};

const getApprovals = (quot, equipmentList) => ({
  ...buildApprovals(quot.items || [], equipmentList),
  ...(quot.approvals || {}),
});

const approvalsAreComplete = (quot, equipmentList) => {
  const approvals = getApprovals(quot, equipmentList);
  const requiredIds = Object.keys(buildApprovals(quot.items || [], equipmentList));
  return requiredIds.every(id => approvals[id]?.approved);
};

const makeVerification = (profile) => ({
  level: profile.phoneVerified && isValidCPF(profile.cpf) ? 'validado' : 'em_analise',
  cpf: profile.cpf,
  phone: profile.phone,
  phoneVerified: Boolean(profile.phoneVerified),
  documentVerified: Boolean(profile.documentVerified || isValidCPF(profile.cpf)),
  validatedBy: profile.validatedBy?.length ? profile.validatedBy : ['Cinestúdio SP', 'FilmeHouse'],
});

const baseVersions = (quot) => quot.versions?.length ? quot.versions : [{
  version: quot.version || 1,
  at: quot.createdAt,
  actor: quot.client || 'Sistema',
  note: 'Pedido inicial criado',
}];

const addVersionEvent = (quot, note, actor, bump = false) => {
  const current = quot.version || 1;
  const version = bump ? current + 1 : current;
  return {
    ...quot,
    version,
    versions: [...baseVersions(quot), { version, at: new Date().toISOString(), actor, note }],
  };
};

const hasCompleteDriver = (driver = {}) => ['name', 'phone', 'vehicle', 'plate'].every(key => String(driver[key] || '').trim());

/* ==========================================================
   TOAST
   ========================================================== */
const Toast = ({ toast, onClose }) => {
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  return (
    <div className="fixed bottom-6 right-6 z-[100] bg-ink-800 border border-ink-600 rounded-2xl p-4 pr-6 flex items-center gap-3 fade-up shadow-2xl max-w-md">
      <div className="w-9 h-9 rounded-full bg-amber-glow/15 flex items-center justify-center text-amber-glow flex-shrink-0">
        <Icon name={toast.icon || 'check'} className="w-4 h-4" strokeWidth={2}/>
      </div>
      <div>
        <div className="text-sm text-ink-50 font-medium">{toast.title}</div>
        {toast.desc && <div className="text-xs text-ink-400 mt-0.5">{toast.desc}</div>}
      </div>
    </div>
  );
};

/* ==========================================================
   SUCCESS MODAL (after quotation submission)
   ========================================================== */

          <Icon name="check" className="w-10 h-10 text-amber-glow" strokeWidth={2.2}/>

        <h2 className="serif-display text-3xl text-ink-50 mb-3">Tudo certo!</h2>
        <p className="text-ink-300 text-sm mb-6 leading-relaxed">
          Sua solicitação foi encaminhada às locadoras. Você receberá a cotação por e-mail e dentro do sistema em até 2 horas úteis.
        </p>
        <div className="bg-ink-950 border border-ink-700 rounded-xl p-4 mb-6">
          <div className="eyebrow text-ink-400 mb-1">Número da cotação</div>

/* ==========================================================
   MAIN APP
   ========================================================== */
const App = () => {
  const saved = useMemo(loadInteractiveState, []);
  const [stage, setStage] = useState('selector'); // selector | login | app
  const [role, setRole] = useState(null);
  const [view, setView] = useState('home');
  const [cart, setCart] = useState(saved?.cart || []);
  const [detailEq, setDetailEq] = useState(null);
  const [detailQuot, setDetailQuot] = useState(null);
  const [quotations, setQuotations] = useState(saved?.quotations || MOCK_QUOTATIONS);
  const [equipment, setEquipment] = useState(saved?.equipment || EQUIPMENT);
  const [team, setTeam] = useState(saved?.team || TEAM_MEMBERS);
  const [profile, setProfile] = useState(saved?.profile || defaultProfile);
  const [auditLog, setAuditLog] = useState(saved?.auditLog || []);
  const [initialCat, setInitialCat] = useState(null);
  const [showNewEq, setShowNewEq] = useState(false);
  const [editingEq, setEditingEq] = useState(null);
  const [toast, setToast] = useState(null);
  const [success, setSuccess] = useState(null);

  const users = {
    ac:    { name: profile.name, role: profile.role, company: null },
    staff: { name: 'Beatriz Oliveira', role: 'Check-out · Cinestúdio SP', company: 'Cinestúdio SP' },
    admin: { name: 'André Silveira',   role: 'Gerente · Cinestúdio SP',  company: 'Cinestúdio SP' },
  };

  const recordAudit = (action, target = '', risk = 'info') => {
    setAuditLog(prev => [{
      id: `audit-${Date.now().toString(36)}`,
      at: new Date().toISOString(),
      actor: users[role]?.name || 'Sistema',
      role: role || 'public',
      action,
      target,
      risk,
    }, ...prev].slice(0, 200));
  };

  const requireRole = (allowedRoles, actionLabel) => {
    if (allowedRoles.includes(role)) return true;
    setToast({ title: 'Acesso negado', desc: `Seu perfil não pode executar: ${actionLabel}.`, icon: 'shield' });
    recordAudit('acesso_negado', actionLabel, 'security');
    return false;
  };

  useEffect(() => {
    try {
      const fullState = { cart, quotations, equipment, team, profile, auditLog };
      sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(fullState));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sanitizeStateForLocalStorage(fullState)));
    } catch (err) {
      setToast({ title: 'Sessão local cheia', desc: 'As alterações continuam ativas enquanto a página ficar aberta.' });
    }
  }, [cart, quotations, equipment, team, profile, auditLog]);

  useEffect(() => {
    if (stage !== 'app') return;
    let lastActivity = Date.now();
    const markActivity = () => { lastActivity = Date.now(); };
    const timer = setInterval(() => {
      if (Date.now() - lastActivity <= SESSION_TIMEOUT_MS) return;
      sessionStorage.removeItem(SESSION_STORAGE_KEY);
      setStage('selector');
      setRole(null);
      setCart([]);
      setView('home');
      setDetailEq(null);
      setDetailQuot(null);
    }, 15000);
    ['click', 'keydown', 'mousemove', 'touchstart'].forEach(evt => window.addEventListener(evt, markActivity, { passive: true }));
    return () => {
      clearInterval(timer);
      ['click', 'keydown', 'mousemove', 'touchstart'].forEach(evt => window.removeEventListener(evt, markActivity));
    };
  }, [stage]);

  const handleSelectRole = (r) => { setRole(r); setStage('login'); };
  const handleLogin = () => {
    setStage('app');
    setView(role === 'ac' ? 'home' : 'dashboard');
    recordAudit('login_simulado', role, 'auth');
  };
  const handleLogout = () => {
    sessionStorage.removeItem(SESSION_STORAGE_KEY);
    recordAudit('logout', role, 'auth');
    setStage('selector');
    setRole(null);
    setCart([]);
    setView('home');
  };

  const handleNav = (v) => {
    if (v.startsWith('home:')) {
      setInitialCat(v.split(':')[1]);
      setView('home');
    } else {
      setInitialCat(null);
      setView(v);
    }
  };

  const addToCart = (eq, qty = 1) => {
    setCart(prev => {
      const existing = prev.find(c => c.id === eq.id);
      if (existing) return prev.map(c => c.id === eq.id ? { ...c, qty: Math.min(eq.qtyAvail, c.qty + qty) } : c);
      return [...prev, { id: eq.id, qty }];
    });
    setToast({ title: 'Adicionado ao carrinho', desc: eq.name, icon: 'check' });
  };

  const updateCart = (id, qty) => setCart(prev => prev.map(c => c.id === id ? { ...c, qty } : c));
  const removeFromCart = (id) => setCart(prev => prev.filter(c => c.id !== id));

  const submitQuotation = (data) => {
    const groups = new Map();
    cart.forEach(item => {
      const eq = equipment.find(e => e.id === item.id);
      if (!eq) return;
      if (!groups.has(eq.rhId)) groups.set(eq.rhId, []);
      groups.get(eq.rhId).push(item);
    });
    const nowIso = new Date().toISOString();
    const createdAt = nowIso.split('T')[0];
    const masterId = `PED-${Math.floor(10000 + Math.random() * 80000)}`;
    const verification = makeVerification(profile);
    const created = Array.from(groups.entries()).map(([rhId, items], index) => {
      const rh = RENTAL_HOUSES.find(r => r.id === rhId);
      const newId = `COT-${Math.floor(3000 + Math.random() * 6000)}${index ? `-${index + 1}` : ''}`;
      return {
        id: newId,
        masterId,
        protocolId: `PRT-${masterId.replace('PED-', '')}-${index + 1}`,
        version: 1,
        client: users.ac.name,
        clientRole: users.ac.role,
        rhId,
        rhName: rh?.name || 'Locadora',
        items,
        pickupDate: data.pickupDate,
        pickupTime: data.pickupTime,
        returnDate: data.returnDate,
        status: 'aguardando',
        createdAt,
        project: safeText(data.project, 80, 'Projeto sem nome'),
        notes: safeText(data.notes, 240, ''),
        total: null,
        holdExpiresAt: null,
        requesterVerification: verification,
        approvals: buildApprovals(items, equipment),
        versions: [{
          version: 1,
          at: nowIso,
          actor: users.ac.name,
          note: index ? `Subpedido criado para ${rh?.name || 'locadora'}` : 'Pedido mestre enviado às locadoras',
        }],
        evidence: {},
        driver: { name: '', phone: '', vehicle: '', plate: '' },
      };
    });
    setQuotations(prev => [...created, ...prev]);
    setCart([]);
    setSuccess(created.map(q => q.id).join(' · '));
    recordAudit('cotacao_criada', masterId, 'workflow');
  };

  const handleQuotAction = (action, quot, payload = {}) => {
    const replaceQuotation = (next, keepOpen = false) => {
      setQuotations(prev => prev.map(q => q.id === next.id ? next : q));
      setDetailQuot(keepOpen ? next : null);
    };

    if (action === 'approveArea') {
      const area = QUOTE_AREAS.find(item => item.id === payload.areaId);
      const approvals = getApprovals(quot, equipment);
      const next = addVersionEvent({
        ...quot,
        approvals: {
          ...approvals,
          [payload.areaId]: {
            ...(approvals[payload.areaId] || {}),
            label: area?.label || payload.areaId,
            owner: area?.owner || 'Responsável',
            approved: true,
            at: new Date().toISOString(),
            actor: users.ac.name,
          },
        },
      }, `Aprovação de ${area?.label || 'área'} registrada`, users.ac.name);
      replaceQuotation(next, true);
      setToast({ title: 'Aprovação registrada', desc: area?.owner || 'Responsável validado.' });
      recordAudit('aprovacao_area', `${quot.id}:${payload.areaId}`, 'approval');
    } else if (action === 'requestRevision') {
      const next = addVersionEvent({
        ...quot,
        status: 'aguardando',
        total: null,
        holdExpiresAt: null,
        approvals: buildApprovals(quot.items || [], equipment),
      }, payload.reason || 'Ajuste solicitado pelo responsável', users.ac.name, true);
      replaceQuotation(next);
      setToast({ title: 'Ajuste solicitado', desc: 'A locadora recebeu a nova versão do pedido.' });
      recordAudit('revisao_solicitada', quot.id, 'workflow');
    } else if (action === 'approve') {
      if (quot.holdExpiresAt && new Date(quot.holdExpiresAt).getTime() < Date.now()) {
        setToast({ title: 'Pré-reserva expirada', desc: 'Solicite uma nova versão antes de aprovar.' });
        return;
      }
      if (!approvalsAreComplete(quot, equipment)) {
        setToast({ title: 'Aprovações pendentes', desc: 'Todos os responsáveis precisam aprovar antes do fechamento.' });
        return;
      }
      const next = addVersionEvent({ ...quot, status: 'aprovada' }, 'Cotação aprovada e estoque bloqueado', users.ac.name);
      replaceQuotation(next);
      setEquipment(prev => prev.map(eq => {
        const requested = quot.items.find(item => item.id === eq.id);
        return requested ? { ...eq, qtyAvail: Math.max(0, eq.qtyAvail - requested.qty) } : eq;
      }));
      setToast({ title: 'Cotação aprovada', desc: 'A locadora foi notificada.' });
      recordAudit('cotacao_aprovada', quot.id, 'approval');
    } else if (action === 'reject') {
      replaceQuotation(addVersionEvent({ ...quot, status: 'recusada' }, 'Cotação recusada', users[role]?.name || 'Sistema'));
      setToast({ title: 'Cotação recusada' });
      recordAudit('cotacao_recusada', quot.id, 'workflow');
    } else if (action === 'quote') {
      const total = payload.total || 8500 + Math.floor(Math.random() * 12000);
      const next = addVersionEvent({
        ...quot,
        status: 'cotada',
        total,
        holdExpiresAt: addHoursIso(24),
        approvals: getApprovals(quot, equipment),
      }, 'Cotação emitida com pré-reserva de 24h', users.staff.name);
      replaceQuotation(next);
      setToast({ title: 'Cotação enviada ao cliente', desc: 'Pré-reserva ativada por 24 horas.' });
      recordAudit('cotacao_emitida', quot.id, 'financial');
    } else if (action === 'schedulePickup') {
      const next = addVersionEvent({ ...quot, status: 'confirmada', pickupScheduledAt: new Date().toISOString() }, 'Horário de retirada confirmado pelo solicitante', users.ac.name);
      replaceQuotation(next);
      setToast({ title: 'Retirada agendada', desc: `${quot.pickupDate} às ${quot.pickupTime}` });
      recordAudit('retirada_agendada', quot.id, 'custody');
    } else if (action === 'saveDriver') {
      const driver = payload.driver || {};
      if (!hasCompleteDriver(driver)) {
        setToast({ title: 'Dados incompletos', desc: 'Informe motorista, telefone, veículo e placa.' });
        return;
      }
      const next = addVersionEvent({ ...quot, driver }, 'Motorista e veículo vinculados ao protocolo', users.staff.name);
      replaceQuotation(next, true);
      setToast({ title: 'Logística salva', desc: `${driver.name} · ${driver.plate}` });
      recordAudit('logistica_vinculada', quot.id, 'custody');
    } else if (action === 'confirmPickup') {
      const driver = payload.driver || quot.driver;
      if (!hasCompleteDriver(driver)) {
        setToast({ title: 'Logística pendente', desc: 'Cadastre motorista e VAN antes de liberar a retirada.' });
        return;
      }
      const next = addVersionEvent({
        ...quot,
        driver,
        status: 'confirmada',
        evidence: { ...(quot.evidence || {}), ...(payload.evidence || {}), driverPickup: true },
        pickupConfirmedAt: new Date().toISOString(),
      }, 'Retirada liberada pela locadora', users.staff.name);
      replaceQuotation(next);
      setToast({ title: 'Retirada confirmada', desc: 'Kit liberado para transporte.' });
      recordAudit('retirada_confirmada', quot.id, 'custody');
    } else if (action === 'finishRental') {
      const next = addVersionEvent({
        ...quot,
        status: 'finalizada',
        evidence: { ...(quot.evidence || {}), ...(payload.evidence || {}) },
        closedAt: new Date().toISOString(),
      }, 'Devolução conferida e protocolo encerrado', users.staff.name);
      replaceQuotation(next);
      setEquipment(prev => prev.map(eq => {
        const requested = quot.items.find(item => item.id === eq.id);
        return requested ? { ...eq, qtyAvail: Math.min(eq.qty, eq.qtyAvail + requested.qty) } : eq;
      }));
      setToast({ title: 'Check-out finalizado', desc: 'Estoque devolvido e protocolo encerrado.' });
      recordAudit('devolucao_finalizada', quot.id, 'custody');
    }
  };

  const saveEquipment = (form) => {
    if (!requireRole(['staff', 'admin'], 'salvar equipamento')) return;
    const qty = Math.max(1, Number(form.qty) || 1);
    const cleanName = safeText(form.name, 80, 'Equipamento sem nome');
    const cleanDesc = safeText(form.desc, 180, '');
    const cleanTech = safeText(form.tech, 160, '');
    if (editingEq) {
      setEquipment(prev => prev.map(eq => eq.id === editingEq.id ? {
        ...eq,
        name: cleanName,
        cat: form.cat,
        desc: cleanDesc,
        tech: cleanTech,
        qty,
        qtyAvail: Math.min(qty, Math.max(0, Number(eq.qtyAvail) + (qty - Number(eq.qty)))),
      } : eq));
      setToast({ title: 'Equipamento atualizado', desc: cleanName });
      recordAudit('equipamento_atualizado', editingEq.id, 'inventory');
    } else {
      const newEquipment = {
        id: makeEquipmentId(cleanName),
        rhId: 'rh1',
        name: cleanName,
        cat: form.cat,
        desc: cleanDesc,
        tech: cleanTech,
        qty,
        qtyAvail: qty,
      };
      setEquipment(prev => [newEquipment, ...prev]);
      setToast({ title: 'Equipamento cadastrado', desc: 'Agora está disponível no catálogo.' });
      recordAudit('equipamento_cadastrado', newEquipment.id, 'inventory');
    }
    setEditingEq(null);
    setShowNewEq(false);
  };

  const editEquipment = (eq) => {
    setEditingEq(eq);
    setShowNewEq(true);
  };

  const deleteEquipment = (eq) => {
    if (!requireRole(['staff', 'admin'], 'remover equipamento')) return;
    const used = quotations.some(q => q.items.some(item => item.id === eq.id) && !['finalizada', 'recusada'].includes(q.status));
    if (used) {
      setToast({ title: 'Equipamento vinculado', desc: 'Finalize ou recuse as cotações antes de remover.' });
      return;
    }
    if (!window.confirm(`Remover "${eq.name}" do catálogo local da demo?`)) return;
    setEquipment(prev => prev.filter(item => item.id !== eq.id));
    setToast({ title: 'Equipamento removido', desc: eq.name });
    recordAudit('equipamento_removido', eq.id, 'inventory');
  };

  const inviteTeamMember = (form) => {
    if (!requireRole(['admin'], 'convidar funcionário')) return;
    const cleanEmail = safeText(form.email, 120, '');
    setTeam(prev => [{ id: `u-${Date.now().toString(36)}`, name: safeText(form.name, 80, 'Novo usuário'), email: cleanEmail, role: safeText(form.role, 40, 'Check-out'), active: true }, ...prev]);
    setToast({ title: 'Convite enviado', desc: cleanEmail, icon: 'mail' });
    recordAudit('convite_equipe', maskEmail(cleanEmail), 'access');
  };

  const toggleTeamMember = (member) => {
    if (!requireRole(['admin'], 'alterar acesso de funcionário')) return;
    setTeam(prev => prev.map(item => item.id === member.id ? { ...item, active: !item.active } : item));
    setToast({ title: member.active ? 'Acesso pausado' : 'Acesso reativado', desc: member.name });
    recordAudit(member.active ? 'acesso_pausado' : 'acesso_reativado', member.id, 'access');
  };

  const removeTeamMember = (member) => {
    if (!requireRole(['admin'], 'remover funcionário')) return;
    if (!window.confirm(`Remover o acesso de "${member.name}" nesta demo?`)) return;
    setTeam(prev => prev.filter(item => item.id !== member.id));
    setToast({ title: 'Funcionário removido', desc: member.name });
    recordAudit('funcionario_removido', member.id, 'access');
  };

  const exportPersonalData = () => {
    if (!window.confirm('Baixar uma cópia local dos seus dados desta demo? O arquivo pode conter CPF, telefone e histórico de cotações.')) return;
    const acNames = new Set([users.ac.name, defaultProfile.name]);
    const payload = {
      exportedAt: new Date().toISOString(),
      profile,
      quotations: quotations.filter(q => acNames.has(q.client)),
      consents: profile.consents || {},
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'meus-dados-cena-demo.json';
    a.click();
    URL.revokeObjectURL(url);
    setToast({ title: 'Dados exportados', desc: 'Arquivo JSON baixado localmente.' });
    recordAudit('dados_pessoais_exportados', 'perfil_ac', 'privacy');
  };

  const deleteLocalPersonalData = () => {
    if (!window.confirm('Excluir os dados pessoais e cotações locais desta sessão? Essa ação remove dados salvos no navegador da demo.')) return;
    const acNames = new Set([users.ac.name, defaultProfile.name]);
    setCart([]);
    setProfile(defaultProfile);
    setQuotations(prev => prev.filter(q => !acNames.has(q.client)));
    sessionStorage.removeItem(SESSION_STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY);
    setToast({ title: 'Dados locais excluídos', desc: 'Perfil, carrinho e cotações do solicitante foram removidos desta demo.' });
    setView('home');
  };

  const handleSecurityAction = (action) => {
    if (action === 'enable2fa') {
      setToast({ title: '2FA ativado para esta demo', icon: 'shield' });
      recordAudit('2fa_ativado', 'perfil_ac', 'auth');
      return;
    }
    if (action === 'password') {
      setToast({ title: 'Fluxo de troca de senha iniciado', desc: 'Em produção, essa etapa exige reautenticação.', icon: 'shield' });
      recordAudit('troca_senha_iniciada', 'perfil_ac', 'auth');
      return;
    }
    if (action === 'exportData') {
      exportPersonalData();
      return;
    }
    if (action === 'deleteLocalData') {
      deleteLocalPersonalData();
    }
  };

  const exportReport = (name) => {
    if (!requireRole(['admin'], 'exportar relatório')) return;
    if (!window.confirm(`Baixar "${name}" no dispositivo atual? Relatórios podem conter dados comerciais sensíveis.`)) return;
    const rows = name === 'Auditoria LGPD'
      ? [
          ['id', 'data', 'perfil', 'ator_mascarado', 'acao', 'alvo', 'risco'],
          ...auditLog.map(log => [log.id, log.at, log.role, maskName(log.actor), log.action, log.target, log.risk]),
        ]
      : [
          ['pedido_mestre', 'id', 'protocolo', 'projeto', 'cliente_mascarado', 'locadora', 'status', 'retirada', 'devolucao', 'valor', 'validade_pre_reserva', 'motorista_mascarado'],
          ...quotations.map(q => [q.masterId || q.id, q.id, q.protocolId || '', q.project, maskName(q.client), q.rhName, q.status, q.pickupDate, q.returnDate, q.total || 0, q.holdExpiresAt || '', maskName(q.driver?.name || '')]),
        ];
    const csv = rows.map(row => row.map(csvCell).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-') || 'relatorio'}-cena.csv`;
    a.click();
    URL.revokeObjectURL(url);
    setToast({ title: 'Relatório exportado', desc: `${name} baixado em CSV.` });
    recordAudit('relatorio_exportado', name, 'privacy');
  };

  /* -------- Render by stage -------- */
  if (stage === 'selector') {
    return <DemoSelector onSelect={handleSelectRole}/>;
  }
  if (stage === 'login') {
    return <LoginScreen role={role} onLogin={handleLogin} onBack={() => setStage('selector')}/>;
  }

  /* -------- App shell -------- */
  const cartCount = cart.reduce((s, c) => s + c.qty, 0);
  let currentScreen;
  if (role === 'ac') {
    const acNames = new Set([users.ac.name, defaultProfile.name]);
    const acQuots = quotations.filter(q => acNames.has(q.client));
    switch (view) {
      case 'home':       currentScreen = <ACExplore equipment={equipment} initialCat={initialCat} onOpenItem={setDetailEq} onAdd={addToCart}/>; break;
      case 'cart':       currentScreen = <ACCart cart={cart} equipment={equipment} onUpdate={updateCart} onRemove={removeFromCart} onSubmit={submitQuotation} onBack={() => setView('home')}/>; break;
      case 'quotations': currentScreen = <ACQuotations quotations={acQuots} onOpen={setDetailQuot}/>; break;
      case 'profile':    currentScreen = <ACProfile profile={profile} onSave={(next) => { setProfile(next); setToast({ title: 'Perfil atualizado', desc: 'Dados salvos nesta demo.' }); recordAudit('perfil_atualizado', 'perfil_ac', 'privacy'); }} onSecurityAction={handleSecurityAction}/>; break;
      default:            currentScreen = <ACExplore equipment={equipment} onOpenItem={setDetailEq} onAdd={addToCart}/>;
    }
  } else if (role === 'staff') {
    const staffQuots = quotations.filter(q => q.rhId === 'rh1');
    switch (view) {
      case 'dashboard':  currentScreen = <StaffDashboard quotations={staffQuots} equipment={equipment} onNav={setView} onOpenQuot={setDetailQuot}/>; break;
      case 'equipment':  currentScreen = <StaffEquipment equipment={equipment} onNew={() => { setEditingEq(null); setShowNewEq(true); }} onView={setDetailEq} onEdit={editEquipment} onDelete={deleteEquipment}/>; break;
      case 'quotations': currentScreen = <StaffQuotations quotations={staffQuots} onOpen={setDetailQuot}/>; break;
      case 'schedule':   currentScreen = <StaffDashboard quotations={staffQuots} equipment={equipment} onNav={setView} onOpenQuot={setDetailQuot}/>; break;
      default:           currentScreen = <StaffDashboard quotations={staffQuots} equipment={equipment} onNav={setView} onOpenQuot={setDetailQuot}/>;
    }
  } else if (role === 'admin') {
    switch (view) {
      case 'dashboard':  currentScreen = <AdminDashboard quotations={quotations} equipment={equipment} team={team} onNav={setView}/>; break;
      case 'rentals':    currentScreen = <AdminRentals quotations={quotations} onOpen={setDetailQuot}/>; break;
      case 'finance':    currentScreen = <AdminFinance quotations={quotations}/>; break;
      case 'equipment':  currentScreen = <StaffEquipment equipment={equipment} onNew={() => { setEditingEq(null); setShowNewEq(true); }} onView={setDetailEq} onEdit={editEquipment} onDelete={deleteEquipment}/>; break;
      case 'team':       currentScreen = <AdminTeam team={team} onInvite={inviteTeamMember} onToggle={toggleTeamMember} onRemove={removeTeamMember} onEdit={(member) => setToast({ title: 'Edição rápida', desc: `${member.name} selecionado.` })}/>; break;
      case 'reports':    currentScreen = <AdminReports onExport={exportReport}/>; break;
      default:           currentScreen = <AdminDashboard quotations={quotations} equipment={equipment} team={team} onNav={setView}/>;
    }
  }

  return (
    <>
      <AppShell
        role={role}
        currentView={view}
        onNav={handleNav}
        cartCount={cartCount}
        onLogout={handleLogout}
        onNotify={() => setToast({ title: 'Notificações', desc: 'Sem novas pendências críticas no momento.', icon: 'bell' })}
        user={users[role]}
      >
        {currentScreen}
      </AppShell>

      {/* Modals */}
      {detailEq && <EquipmentDetail eq={detailEq} onClose={() => setDetailEq(null)} onAdd={role === 'ac' ? addToCart : null}/>}
      {detailQuot && <QuotationDetail quot={detailQuot} equipment={equipment} onClose={() => setDetailQuot(null)} onAction={handleQuotAction} viewerRole={role}/>}

      {showNewEq && <NewEquipmentForm initial={editingEq} onClose={() => { setShowNewEq(false); setEditingEq(null); }} onSave={saveEquipment}/>}

      <SuccessModal open={!!success} quotId={success} onClose={() => { setSuccess(null); setView('quotations'); }}/>

      <Toast toast={toast} onClose={() => setToast(null)}/>

      {/* Floating demo switcher */}
      {stage === 'app' && !SECURITY_MODE && (
        <div className="fixed bottom-6 left-6 z-40 bg-ink-900/95 backdrop-blur border border-ink-700 rounded-full px-2 py-2 flex items-center gap-1 shadow-xl">
          <div className="px-3 py-1 eyebrow text-ink-400">Demo</div>
          {[
            { id: 'ac', label: 'Cliente' },
            { id: 'staff', label: 'Locadora' },
            { id: 'admin', label: 'Admin' },
          ].map(r => (
            <button key={r.id}
              onClick={() => { setRole(r.id); setView(r.id === 'ac' ? 'home' : 'dashboard'); setCart([]); }}
              className={`px-3 py-1.5 rounded-full text-xs transition-all ${role === r.id ? 'bg-amber-glow text-ink-950 font-medium' : 'text-ink-300 hover:text-ink-100'}`}
            >{r.label}</button>
          ))}
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
