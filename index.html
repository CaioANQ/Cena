  if (d.length <= 2) return d;
  if (d.length <= 7) return `(${d.slice(0,2)}) ${d.slice(2)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;

const formatCPF = (v) => {

  if (d.length <= 3) return d;

  if (d.length <= 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
  return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
};

/* ==========================================================
   AC - CART + QUOTATION FLOW
   ========================================================== */
const ACCart = ({ cart, onUpdate, onRemove, onSubmit, onBack }) => {
  const [pickupDate, setPickupDate] = useState('2026-04-28');
  const [pickupTime, setPickupTime] = useState('08:30');
  const [returnDate, setReturnDate] = useState('2026-05-02');
  const [project, setProject] = useState('');
  const [notes, setNotes] = useState('');
  const [step, setStep] = useState(1);

  // Group by rental house
  const groups = useMemo(() => {
    const m = new Map();
    cart.forEach(item => {
      const eq = EQUIPMENT.find(e => e.id === item.id);
      if (!m.has(eq.rhId)) m.set(eq.rhId, []);
      m.get(eq.rhId).push({ ...item, eq });
    });
    return Array.from(m.entries()).map(([rhId, items]) => ({ rh: RENTAL_HOUSES.find(r => r.id === rhId), items }));
  }, [cart]);

  const totalItems = cart.reduce((s, c) => s + c.qty, 0);

  if (cart.length === 0) {
    return (
      <div className="p-8 max-w-4xl">
        <h1 className="serif-display text-4xl text-ink-50 mb-2">Carrinho</h1>
        <p className="text-ink-300 mb-10">Seu carrinho está vazio.</p>
        <div className="bg-ink-900 border border-ink-700 rounded-3xl p-16 text-center">
          <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-ink-800 flex items-center justify-center">
            <Icon name="cart" className="w-8 h-8 text-ink-400" strokeWidth={1.2}/>
          </div>
          <h2 className="serif-display text-2xl text-ink-50 mb-2">Nada por aqui ainda</h2>
          <p className="text-ink-300 text-sm mb-6">Explore o catálogo e adicione equipamentos para solicitar uma cotação.</p>
          <button onClick={onBack} className="btn-primary px-6 py-3 rounded-xl inline-flex items-center gap-2">
            Explorar catálogo <Icon name="arrowRight" className="w-4 h-4" strokeWidth={2}/>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="p-8 max-w-6xl">
      <div className="mb-8">
        <button onClick={onBack} className="text-ink-400 hover:text-ink-100 text-sm mb-4 flex items-center gap-2">
          <Icon name="chevronLeft" className="w-4 h-4"/> Continuar comprando
        </button>
        <h1 className="serif-display text-4xl text-ink-50 mb-2">Carrinho e cotação</h1>
        <p className="text-ink-300">{totalItems} itens · {groups.length} {groups.length === 1 ? 'locadora' : 'locadoras'}</p>
      </div>

      {/* Stepper */}
      <div className="flex items-center gap-3 mb-10">
        {['Itens', 'Datas', 'Revisão'].map((label, i) => (
          <React.Fragment key={label}>
            <div className={`flex items-center gap-2 ${step >= i + 1 ? 'text-amber-glow' : 'text-ink-400'}`}>
              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold ${step >= i + 1 ? 'bg-amber-glow text-ink-950' : 'bg-ink-800 text-ink-300'}`}>
                {step > i + 1 ? <Icon name="check" className="w-3.5 h-3.5" strokeWidth={2.5}/> : i + 1}
              </div>
              <span className="text-sm font-medium">{label}</span>
            </div>
            {i < 2 && <div className={`flex-1 max-w-[80px] h-px ${step > i + 1 ? 'bg-amber-glow' : 'bg-ink-700'}`}></div>}
          </React.Fragment>
        ))}
      </div>

      <div className="grid lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2 space-y-6">
          {step === 1 && groups.map(({ rh, items }) => (
            <div key={rh.id} className="bg-ink-900 border border-ink-700 rounded-2xl overflow-hidden fade-up">
              <div className="px-5 py-4 border-b border-ink-700 flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-glow to-amber-gold flex items-center justify-center text-ink-950 font-semibold text-sm">{rh.name.charAt(0)}</div>
                <div>
                  <div className="text-ink-50 font-medium text-sm">{rh.name}</div>
                  <div className="text-xs text-ink-400">{rh.city}</div>
                </div>
                <div className="ml-auto text-xs text-ink-400">{items.length} {items.length === 1 ? 'item' : 'itens'}</div>
              </div>
              <div className="divide-y divide-ink-800">
                {items.map(item => (
                  <div key={item.id} className="p-5 flex items-center gap-4">
                    <div className="w-14 h-14 rounded-xl bg-ink-800 flex items-center justify-center flex-shrink-0">
                      <Icon name={CATEGORIES.find(c => c.id === item.eq.cat)?.icon} className="w-6 h-6 text-amber-warm" strokeWidth={1.3}/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="serif-display text-base text-ink-50 leading-tight">{item.eq.name}</div>

                        <Icon name="plus" className="w-3.5 h-3.5" strokeWidth={2}/>

          {step === 2 && (

                  <label className="eyebrow text-ink-400 block mb-2">Data de retirada</label>
                  <input type="date" value={pickupDate} onChange={(e) => setPickupDate(e.target.value)} className="input-field w-full px-4 py-3 rounded-xl"/>
                </div>
                <div>
                  <label className="eyebrow text-ink-400 block mb-2">Horário de retirada</label>
                  <input type="time" value={pickupTime} onChange={(e) => setPickupTime(e.target.value)} className="input-field w-full px-4 py-3 rounded-xl"/>
                </div>
                <div>
                  <label className="eyebrow text-ink-400 block mb-2">Data de devolução</label>
                  <input type="date" value={returnDate} onChange={(e) => setReturnDate(e.target.value)} className="input-field w-full px-4 py-3 rounded-xl"/>
                </div>
                <div>
                  <label className="eyebrow text-ink-400 block mb-2">Dias de locação</label>

                <div className="md:col-span-2">
                  <label className="eyebrow text-ink-400 block mb-2">Observações (opcional)</label>
                  <textarea rows="3" placeholder="Ex: necessário kit de filtros, check-out na quinta-feira" value={notes} onChange={(e) => setNotes(e.target.value)} className="input-field w-full px-4 py-3 rounded-xl resize-none"></textarea>

              </div>

              <div className="bg-ink-950 border border-ink-700 rounded-xl p-4 mt-6 flex items-start gap-3">

                </div>
              </div>
            </div>

          {step === 3 && (

              <h3 className="serif-display text-xl text-ink-50 mb-4">Revisão final</h3>

                <div className="flex items-center justify-between py-3 border-b border-ink-800">

                  <span className="text-sm text-ink-100 font-medium">{project || '—'}</span>
                </div>
                <div className="flex items-center justify-between py-3 border-b border-ink-800">

                  <span className="text-sm text-ink-100 font-mono">{fmtDate(pickupDate)} · {pickupTime}</span>
                </div>
                <div className="flex items-center justify-between py-3 border-b border-ink-800">

    <div className="p-8 max-w-7xl">
      <div className="mb-8">
        <h1 className="serif-display text-4xl text-ink-50 mb-2">Todas as locações</h1>
        <p className="text-ink-300">Visão completa de cotações, aprovações, retiradas e devoluções.</p>
      </div>

      <div className="grid md:grid-cols-4 gap-3 mb-6">
        {['Total', 'Aguardando', 'Confirmadas', 'Finalizadas'].map((l, i) => (
          <div key={l} className="bg-ink-900 border border-ink-700 rounded-xl p-4">
            <div className="eyebrow text-ink-400 mb-1">{l}</div>

      <div className="bg-ink-900 border border-ink-700 rounded-2xl overflow-hidden fade-up">
        <table className="w-full">
          <thead>
            <tr className="border-b border-ink-700">
              <th className="text-left px-5 py-3 eyebrow text-ink-400">ID</th>
              <th className="text-left px-5 py-3 eyebrow text-ink-400">Projeto / Cliente</th>
              <th className="text-left px-5 py-3 eyebrow text-ink-400 hidden md:table-cell">Período</th>
              <th className="text-left px-5 py-3 eyebrow text-ink-400 hidden lg:table-cell">Itens</th>
              <th className="text-left px-5 py-3 eyebrow text-ink-400">Status</th>
              <th className="text-right px-5 py-3 eyebrow text-ink-400">Valor</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-ink-800">
            {MOCK_QUOTATIONS.map(q => (
              <tr key={q.id} onClick={() => onOpen(q)} className="hover:bg-ink-800/40 transition-colors cursor-pointer">
                <td className="px-5 py-4 font-mono text-xs text-amber-glow">{q.id}</td>
                <td className="px-5 py-4">
                  <div className="text-sm text-ink-50 font-medium">{q.project}</div>
                  <div className="text-xs text-ink-400">{q.client}</div>
                </td>
                <td className="px-5 py-4 hidden md:table-cell font-mono text-xs text-ink-300">
                  {fmtDateShort(q.pickupDate)} → {fmtDateShort(q.returnDate)}
                </td>
                <td className="px-5 py-4 hidden lg:table-cell text-sm text-ink-300 font-mono">
                  {q.items.reduce((s, i) => s + i.qty, 0)}
                </td>
                <td className="px-5 py-4"><StatusBadge status={q.status}/></td>
                <td className="px-5 py-4 text-right text-sm font-medium text-ink-100">{currency(q.total)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ==========================================================
   ADMIN - REPORTS
   ========================================================== */
const AdminReports = () => {
  return (
    <div className="p-8 max-w-6xl">
      <div className="mb-8">
        <h1 className="serif-display text-4xl text-ink-50 mb-2">Relatórios</h1>
        <p className="text-ink-300">Exporte dados consolidados para análise financeira e operacional.</p>
      </div>

      <div className="grid md:grid-cols-2 gap-4">
        {[
          { t: 'Receita consolidada', d: 'Total mensal, por categoria e por cliente', i: 'chart' },
          { t: 'Taxa de ocupação',     d: 'Utilização dos equipamentos no período',     i: 'box' },
          { t: 'Fluxo operacional',    d: 'Retiradas, devoluções, tempo médio',         i: 'truck' },
          { t: 'Clientes ativos',       d: 'Base de contratantes e recorrência',         i: 'users' },
          { t: 'Auditoria LGPD',        d: 'Logs de acesso e trilha de consentimento',   i: 'shield' },
          { t: 'Relatório customizado', d: 'Crie seu próprio recorte',                    i: 'settings' },
        ].map((r, i) => (
          <button key={i} style={{ animationDelay: `${i * 0.04}s` }} className="fade-up bg-ink-900 border border-ink-700 rounded-2xl p-6 text-left card-hover group">
            <div className="flex items-start justify-between mb-4">
              <div className="w-10 h-10 rounded-xl bg-amber-glow/10 flex items-center justify-center text-amber-glow">
                <Icon name={r.i} className="w-5 h-5" strokeWidth={1.5}/>
              </div>
              <Icon name="arrowRight" className="w-4 h-4 text-ink-400 group-hover:text-amber-glow group-hover:translate-x-1 transition-all"/>
            </div>
            <div className="serif-display text-xl text-ink-50 mb-1">{r.t}</div>
            <div className="text-sm text-ink-400">{r.d}</div>
            <div className="flex items-center gap-2 mt-4 text-xs text-ink-300">
              <Icon name="fileText" className="w-3.5 h-3.5"/> PDF
              <span className="text-ink-700">·</span>
              <Icon name="fileText" className="w-3.5 h-3.5"/> Excel
            </div>
          </button>
        ))}
      </div>
    </div>
  );
};

window.__CENA_STAFF_ADMIN__ = { StaffDashboard, StaffEquipment, NewEquipmentForm, StaffQuotations, AdminDashboard, AdminTeam, AdminRentals, AdminReports };
</script>

<script type="text/babel" data-type="module">
/* ============================================================
   PART 5 — Main App orchestration
   ============================================================ */
const { useState, useEffect, useMemo } = React;
const { Icon, Logo, EquipmentCard, RENTAL_HOUSES, CATEGORIES, EQUIPMENT, MOCK_QUOTATIONS, TEAM_MEMBERS, currency, fmtDate, fmtDateShort, formatPhone, formatCPF, isValidPhone, isValidCPF, StatusBadge, statusConfig } = window.__CENA_BASE__;
const { DemoSelector, LoginScreen, AppShell } = window.__CENA_PART2__;
const { ACExplore, EquipmentDetail, ACCart, ACQuotations, QuotationDetail, ACProfile } = window.__CENA_AC__;
const { StaffDashboard, StaffEquipment, NewEquipmentForm, StaffQuotations, AdminDashboard, AdminTeam, AdminRentals, AdminReports } = window.__CENA_STAFF_ADMIN__;

/* ==========================================================
   TOAST
   ========================================================== */
const Toast = ({ toast, onClose }) => {
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  return (
    <div className="fixed bottom-6 right-6 z-[100] bg-ink-800 border border-ink-600 rounded-2xl p-4 pr-6 flex items-center gap-3 fade-up shadow-2xl max-w-md">
      <div className="w-9 h-9 rounded-full bg-amber-glow/15 flex items-center justify-center text-amber-glow flex-shrink-0">
        <Icon name={toast.icon || 'check'} className="w-4 h-4" strokeWidth={2}/>
      </div>
      <div>
        <div className="text-sm text-ink-50 font-medium">{toast.title}</div>
        {toast.desc && <div className="text-xs text-ink-400 mt-0.5">{toast.desc}</div>}
      </div>
    </div>
  );
};

/* ==========================================================
   SUCCESS MODAL (after quotation submission)
   ========================================================== */
const SuccessModal = ({ open, onClose, quotId }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-ink-950/85 backdrop-blur-sm fade-up">
      <div className="bg-ink-900 border border-ink-700 rounded-3xl max-w-md w-full p-10 text-center">
        <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-amber-glow/15 flex items-center justify-center amber-glow-strong">
          <Icon name="check" className="w-10 h-10 text-amber-glow" strokeWidth={2.2}/>
        </div>
        <div className="eyebrow text-amber-glow mb-2">Cotação enviada</div>
        <h2 className="serif-display text-3xl text-ink-50 mb-3">Tudo certo!</h2>
        <p className="text-ink-300 text-sm mb-6 leading-relaxed">
          Sua solicitação foi encaminhada às locadoras. Você receberá a cotação por e-mail e dentro do sistema em até 2 horas úteis.
        </p>
        <div className="bg-ink-950 border border-ink-700 rounded-xl p-4 mb-6">
          <div className="eyebrow text-ink-400 mb-1">Número da cotação</div>
          <div className="serif-display text-2xl text-amber-warm">{quotId}</div>
        </div>
        <button onClick={onClose} className="btn-primary w-full py-3.5 rounded-xl">
          Acompanhar pedido
        </button>
      </div>
    </div>
  );
};

/* ==========================================================
   MAIN APP
   ========================================================== */
const App = () => {
  const [stage, setStage] = useState('selector'); // selector | login | app
  const [role, setRole] = useState(null);
  const [view, setView] = useState('home');
  const [cart, setCart] = useState([]);
  const [detailEq, setDetailEq] = useState(null);
  const [detailQuot, setDetailQuot] = useState(null);
  const [quotations, setQuotations] = useState(MOCK_QUOTATIONS);
  const [initialCat, setInitialCat] = useState(null);
  const [showNewEq, setShowNewEq] = useState(false);
  const [toast, setToast] = useState(null);
  const [success, setSuccess] = useState(null);

  const users = {
    ac:    { name: 'Carlos Menezes', role: '1º Assistente de Câmera', company: null },
    staff: { name: 'Beatriz Oliveira', role: 'Check-out · Cinestúdio SP', company: 'Cinestúdio SP' },
    admin: { name: 'André Silveira',   role: 'Gerente · Cinestúdio SP',  company: 'Cinestúdio SP' },
  };

  const handleSelectRole = (r) => { setRole(r); setStage('login'); };
  const handleLogin = () => {
    setStage('app');
    setView(role === 'ac' ? 'home' : 'dashboard');
  };
  const handleLogout = () => {
    setStage('selector');
    setRole(null);
    setCart([]);
    setView('home');
  };

  const handleNav = (v) => {
    if (v.startsWith('home:')) {
      setInitialCat(v.split(':')[1]);
      setView('home');
    } else {
      setInitialCat(null);
      setView(v);
    }
  };

  const addToCart = (eq, qty = 1) => {
    setCart(prev => {
      const existing = prev.find(c => c.id === eq.id);
      if (existing) return prev.map(c => c.id === eq.id ? { ...c, qty: Math.min(eq.qtyAvail, c.qty + qty) } : c);
      return [...prev, { id: eq.id, qty }];
    });
    setToast({ title: 'Adicionado ao carrinho', desc: eq.name, icon: 'check' });
  };

  const updateCart = (id, qty) => setCart(prev => prev.map(c => c.id === id ? { ...c, qty } : c));
  const removeFromCart = (id) => setCart(prev => prev.filter(c => c.id !== id));

  const submitQuotation = (data) => {
    const newId = `COT-${2042 + Math.floor(Math.random() * 10)}`;
    const newQ = {
      id: newId,
      client: users.ac.name,
      clientRole: users.ac.role,
      rhId: 'rh1',
      rhName: 'Cinestúdio SP',
      items: cart,
      pickupDate: data.pickupDate,
      pickupTime: data.pickupTime,
      returnDate: data.returnDate,
      status: 'aguardando',
      createdAt: new Date().toISOString().split('T')[0],
      project: data.project || 'Projeto sem nome',
      total: null,
    };
    setQuotations(prev => [newQ, ...prev]);
    setCart([]);
    setSuccess(newId);
  };

  const handleQuotAction = (action, quot) => {
    if (action === 'approve') {
      setQuotations(prev => prev.map(q => q.id === quot.id ? { ...q, status: 'aprovada' } : q));
      setToast({ title: 'Cotação aprovada', desc: 'A locadora foi notificada.' });
    } else if (action === 'reject') {
      setQuotations(prev => prev.map(q => q.id === quot.id ? { ...q, status: 'recusada' } : q));
      setToast({ title: 'Cotação recusada' });
    } else if (action === 'quote') {
      setQuotations(prev => prev.map(q => q.id === quot.id ? { ...q, status: 'cotada', total: 8500 + Math.floor(Math.random() * 12000) } : q));
      setToast({ title: 'Cotação enviada ao cliente' });
    }
    setDetailQuot(null);
  };

  /* -------- Render by stage -------- */
  if (stage === 'selector') {
    return <DemoSelector onSelect={handleSelectRole}/>;
  }
  if (stage === 'login') {
    return <LoginScreen role={role} onLogin={handleLogin} onBack={() => setStage('selector')}/>;
  }

  /* -------- App shell -------- */
  const cartCount = cart.reduce((s, c) => s + c.qty, 0);
  let currentScreen;
  if (role === 'ac') {
    const acQuots = quotations.filter(q => q.client === users.ac.name);
    switch (view) {
      case 'home':       currentScreen = <ACExplore initialCat={initialCat} onOpenItem={setDetailEq} onAdd={addToCart}/>; break;
      case 'cart':       currentScreen = <ACCart cart={cart} onUpdate={updateCart} onRemove={removeFromCart} onSubmit={submitQuotation} onBack={() => setView('home')}/>; break;
      case 'quotations': currentScreen = <ACQuotations quotations={acQuots} onOpen={setDetailQuot}/>; break;
      case 'profile':    currentScreen = <ACProfile/>; break;
      default:            currentScreen = <ACExplore onOpenItem={setDetailEq} onAdd={addToCart}/>;
    }
  } else if (role === 'staff') {
    switch (view) {
      case 'dashboard':  currentScreen = <StaffDashboard onNav={setView} onOpenQuot={setDetailQuot}/>; break;
      case 'equipment':  currentScreen = <StaffEquipment onNew={() => setShowNewEq(true)}/>; break;
      case 'quotations': currentScreen = <StaffQuotations onOpen={setDetailQuot}/>; break;
      case 'schedule':   currentScreen = <StaffDashboard onNav={setView} onOpenQuot={setDetailQuot}/>; break;
      default:           currentScreen = <StaffDashboard onNav={setView} onOpenQuot={setDetailQuot}/>;
    }
  } else if (role === 'admin') {
    switch (view) {
      case 'dashboard':  currentScreen = <AdminDashboard/>; break;
      case 'rentals':    currentScreen = <AdminRentals onOpen={setDetailQuot}/>; break;
      case 'equipment':  currentScreen = <StaffEquipment onNew={() => setShowNewEq(true)}/>; break;
      case 'team':       currentScreen = <AdminTeam/>; break;
      case 'reports':    currentScreen = <AdminReports/>; break;
      default:           currentScreen = <AdminDashboard/>;
    }
  }

  return (
    <>
      <AppShell
        role={role}
        currentView={view}
        onNav={handleNav}
        cartCount={cartCount}
        onLogout={handleLogout}
        user={users[role]}
      >
        {currentScreen}
      </AppShell>

      {/* Modals */}
      <EquipmentDetail eq={detailEq} onClose={() => setDetailEq(null)} onAdd={addToCart}/>
      <QuotationDetail quot={detailQuot} onClose={() => setDetailQuot(null)} onAction={handleQuotAction} viewerRole={role}/>

      {showNewEq && <NewEquipmentForm onClose={() => setShowNewEq(false)} onSave={() => { setShowNewEq(false); setToast({ title: 'Equipamento cadastrado', desc: 'Agora está disponível no catálogo.' }); }}/>}

      <SuccessModal open={!!success} quotId={success} onClose={() => { setSuccess(null); setView('quotations'); }}/>

      <Toast toast={toast} onClose={() => setToast(null)}/>

      {/* Floating demo switcher */}
      {stage === 'app' && (
        <div className="fixed bottom-6 left-6 z-40 bg-ink-900/95 backdrop-blur border border-ink-700 rounded-full px-2 py-2 flex items-center gap-1 shadow-xl">
          <div className="px-3 py-1 eyebrow text-ink-400">Demo</div>
          {[
            { id: 'ac', label: 'Cliente' },
            { id: 'staff', label: 'Locadora' },
            { id: 'admin', label: 'Admin' },
          ].map(r => (
            <button key={r.id}
              onClick={() => { setRole(r.id); setView(r.id === 'ac' ? 'home' : 'dashboard'); setCart([]); }}
              className={`px-3 py-1.5 rounded-full text-xs transition-all ${role === r.id ? 'bg-amber-glow text-ink-950 font-medium' : 'text-ink-300 hover:text-ink-100'}`}
            >{r.label}</button>
          ))}
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
