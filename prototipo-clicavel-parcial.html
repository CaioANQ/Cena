          <div className="flex gap-2">
            <div className="tap w-9 h-9 bg-ink-950/60 backdrop-blur border border-ink-800 rounded-full flex items-center justify-center"><Icon n="heart" s={14} c="text-ink-200"/></div>
            <div className="tap w-9 h-9 bg-ink-950/60 backdrop-blur border border-ink-800 rounded-full flex items-center justify-center"><Icon n="info" s={14} c="text-ink-200"/></div>
          </div>
        </div>
        <EqIcon cat={eq.cat} size={120}/>
      </div>
      <div className="px-5 pt-4">
        <div className="flex items-start justify-between gap-3 mb-1"><h1 className="serif text-[22px] leading-tight text-ink-50">{eq.name}</h1><StatusBadge status="ready"/></div>
        <p className="text-[11px] text-ink-400 mb-3">{eq.desc}</p>
        <div onClick={() => navigateTo('house', { houseId: eq.house })} className="tap flex items-center gap-2 p-2.5 bg-ink-900 border border-ink-800 rounded-xl mb-4">
          <div className="w-8 h-8 bg-gradient-to-br from-ink-700 to-ink-800 rounded-lg flex items-center justify-center"><Icon n="building" s={13} c="text-amber-warm"/></div>
          <div className="flex-1 min-w-0">
            <p className="text-[11px] text-ink-100 font-medium leading-none">{house?.name}</p>
            <p className="text-[9px] text-ink-500 mt-0.5">{house?.district} · {house?.distance}</p>
          </div>
          <Icon n="chevronRight" s={13} c="text-ink-500"/>
        </div>
        <div className="flex gap-4 border-b border-ink-800 mb-3">
          {[{id:'overview',label:'Geral'},{id:'specs',label:'Técnica'},{id:'included',label:'Inclusos'}].map(t => (
            <div key={t.id} onClick={() => setTab(t.id)} className={`tap pb-2.5 text-[12px] relative ${tab === t.id ? 'text-ink-50 font-medium' : 'text-ink-400'}`}>
              {t.label}{tab === t.id && <span className="absolute bottom-0 left-0 right-0 h-[2px] bg-amber-glow"></span>}
            </div>
          ))}
        </div>
        {tab === 'specs' && <div className="space-y-2 mb-4">{eq.specs.map(([k,v],i) => <div key={i} className="flex items-center justify-between py-1.5 border-b border-ink-800/50"><span className="text-[11px] text-ink-400">{k}</span><span className="text-[11px] text-ink-100 mono">{v}</span></div>)}</div>}
        {tab === 'overview' && <div className="space-y-3 mb-4 text-[12px] text-ink-300 leading-relaxed"><p>{eq.desc}</p><p>Disponível em <span className="text-amber-warm">{house?.name}</span>. Manutenção preventiva em dia e kit completo incluso.</p></div>}
        {tab === 'included' && <div className="space-y-2 mb-4">{['Kit de acessórios padrão','Bateria e carregador','Cartão de memória','Cabo de alimentação','Maleta rígida'].map((it,i) => <div key={i} className="flex items-center gap-2 text-[11px] text-ink-300"><Icon n="check" s={12} c="text-film-green"/> {it}</div>)}</div>}
        <div className="flex items-center justify-between p-3 bg-ink-900 border border-ink-800 rounded-xl mb-3">
          <div><p className="text-[11px] text-ink-400">Quantidade</p><p className="text-[9px] text-film-green">{eq.avail} disponíveis</p></div>
          <div className="flex items-center gap-3">
            <div onClick={() => setQty(Math.max(1, qty-1))} className={`tap w-7 h-7 border border-ink-700 rounded-full flex items-center justify-center ${qty <= 1 ? 'opacity-40' : ''}`}><Icon n="minus" s={12} c="text-ink-300"/></div>
            <span className="serif text-[20px] text-ink-50 w-5 text-center">{qty}</span>
            <div onClick={() => setQty(Math.min(eq.avail, qty+1))} className={`tap w-7 h-7 bg-amber-glow rounded-full flex items-center justify-center ${qty >= eq.avail ? 'opacity-40' : ''}`}><Icon n="plus" s={12} c="text-ink-950" w={2.5}/></div>
          </div>
        </div>
      </div>
      <div className="absolute bottom-0 left-0 right-0 bg-ink-950/95 backdrop-blur border-t border-ink-800 px-4 pt-3 pb-5">
        <button onClick={handleAdd} className="tap w-full bg-amber-glow text-ink-950 font-semibold py-3.5 rounded-xl text-[13px] flex items-center justify-center gap-2"><Icon n="bag" s={14}/> Adicionar ao carrinho</button>
      </div>
    </div>
  );
};

// ----- SEARCH -----
const ScreenSearch = () => {
  const { goBack, navigateTo } = useNav();
  const [q, setQ] = useState('');
  const results = useMemo(() => q.trim() ? EQUIPMENT.filter(e => e.name.toLowerCase().includes(q.toLowerCase())) : [], [q]);
  return (
    <div className="h-full bg-ink-950 route-enter">
      <div className="px-5 pt-3 pb-3 border-b border-ink-800/60 flex items-center gap-3">
        <button onClick={goBack} className="tap p-1 -ml-1"><Icon n="arrowLeft" s={18} c="text-ink-200"/></button>
        <div className="flex-1 bg-ink-900 border border-ink-800 rounded-full flex items-center px-3 py-2 gap-2">
          <Icon n="search" s={14} c="text-ink-400"/>
          <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar…" className="flex-1 bg-transparent text-[12px] text-ink-100 outline-none placeholder:text-ink-500"/>
          {q && <button onClick={() => setQ('')} className="tap"><Icon n="x" s={12} c="text-ink-500"/></button>}
        </div>
      </div>
      <div className="px-5 py-3 overflow-y-auto" style={{maxHeight: 'calc(100% - 60px)'}}>
        {!q && (<><p className="eyebrow text-ink-500 mb-3">Buscas recentes</p><div className="space-y-2">{['alexa mini','supreme prime','skypanel'].map(s => <div key={s} onClick={() => setQ(s)} className="tap flex items-center gap-3 p-2"><Icon n="clock" s={12} c="text-ink-500"/><span className="text-[12px] text-ink-200">{s}</span></div>)}</div></>)}
        {q && results.length === 0 && <div className="text-center py-12 text-[12px] text-ink-500">Nenhum resultado</div>}
        <div className="space-y-2">{results.map(eq => {
          const house = getHouse(eq.house);
          return (
            <div key={eq.id} onClick={() => navigateTo('eqDetail', { eqId: eq.id })} className="tap bg-ink-900 border border-ink-800 rounded-xl p-3 flex items-center gap-3">
              <div className="w-12 h-12 bg-ink-850 rounded-lg flex items-center justify-center shrink-0"><EqIcon cat={eq.cat} size={44}/></div>
              <div className="flex-1 min-w-0"><p className="text-[12px] text-ink-100 font-medium">{eq.name}</p><p className="text-[10px] text-ink-500">{house?.name} · <span className="mono">{eq.spec}</span></p></div>
              <Icon n="chevronRight" s={13} c="text-ink-500"/>
            </div>
          );
        })}</div>
      </div>
    </div>
  );
};

// ----- NOTIFICATIONS -----
const ScreenNotifications = () => {
  const { goBack, navigateTo } = useNav();
  const { markNotifsRead } = useData();
  useEffect(() => { markNotifsRead(); }, []);
  const notifs = [
    { icon:'sparkles', title:'Orçamento recebido', sub:'Cinestúdio SP enviou orçamento para COT-0248', time:'14:32', unread:true, action:() => navigateTo('quotationDetail', { quotationId: 'COT-0248' }) },
    { icon:'clock', title:'FilmeHouse começou análise', sub:'Sua cotação COT-0249 está em análise', time:'14:28', unread:true },
    { icon:'checkCircle', title:'Cotação aprovada', sub:'Luz & Câmera confirmou COT-0247', time:'Ontem', unread:false },
    { icon:'bell', title:'Diária amanhã', sub:'Retirada em Cinestúdio SP às 07:00', time:'Ontem', unread:false },
  ];
  return (
    <div className="h-full bg-ink-950 route-enter">
      <PageHeader title="Notificações"/>
      <div className="overflow-y-auto" style={{maxHeight: 'calc(100% - 60px)'}}>
        {notifs.map((n,i) => (
          <div key={i} onClick={n.action} className={`tap px-5 py-3 flex gap-3 border-b border-ink-800/50 ${n.unread ? 'bg-amber-glow/5' : ''}`}>
            <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 bg-amber-glow/15 text-amber-glow"><Icon n={n.icon} s={14}/></div>
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-2"><p className="text-[12px] text-ink-100 font-medium">{n.title}</p><span className="text-[9px] text-ink-500 shrink-0">{n.time}</span></div>
              <p className="text-[11px] text-ink-400 leading-snug mt-0.5">{n.sub}</p>
            </div>
            {n.unread && <span className="w-1.5 h-1.5 bg-amber-glow rounded-full mt-2 shrink-0"></span>}
          </div>
        ))}
      </div>
    </div>
  );
};

// ----- HOUSE -----
const ScreenHouse = () => {
  const { params, goBack } = useNav();
  const house = getHouse(params.houseId);
  const items = EQUIPMENT.filter(e => e.house === params.houseId);
  if (!house) return null;
  return (
    <div className="h-full bg-ink-950 overflow-y-auto pb-[80px] route-enter">
      <div className="relative bg-gradient-to-b from-ink-850 to-ink-900 h-40 cine-glow">
        <div className="absolute top-3 left-3 z-10"><button onClick={goBack} className="tap w-9 h-9 bg-ink-950/60 backdrop-blur border border-ink-800 rounded-full flex items-center justify-center"><Icon n="arrowLeft" s={16} c="text-ink-100"/></button></div>
        <div className="absolute inset-0 flex items-center justify-center"><div className="w-16 h-16 bg-gradient-to-br from-amber-warm/30 to-amber-glow/20 rounded-2xl flex items-center justify-center"><Icon n="building" s={28} c="text-amber-warm"/></div></div>
      </div>
      <div className="px-5 pt-4">
        <h1 className="serif text-[22px] text-ink-50 mb-1">{house.name}</h1>
        <div className="flex items-center gap-3 text-[11px] text-ink-400 mb-4"><span className="flex items-center gap-1"><Icon n="mapPin" s={11}/> {house.district} · {house.distance}</span><span className="flex items-center gap-1 text-amber-warm"><Icon n="star" s={11}/> {house.rating}</span></div>
        <div className="grid grid-cols-3 gap-2 mb-5">
          <div className="bg-ink-900 border border-ink-800 rounded-xl p-2.5 text-center"><p className="serif text-[16px] text-amber-glow">{house.items}</p><p className="text-[9px] text-ink-500 mt-0.5">itens</p></div>
          <div className="bg-ink-900 border border-ink-800 rounded-xl p-2.5 text-center"><p className="serif text-[16px] text-amber-glow">{house.rating}</p><p className="text-[9px] text-ink-500 mt-0.5">avaliação</p></div>
          <div className="bg-ink-900 border border-ink-800 rounded-xl p-2.5 text-center"><p className="serif text-[16px] text-amber-glow">{house.responseTime}</p><p className="text-[9px] text-ink-500 mt-0.5">resposta</p></div>
        </div>
        <p className="eyebrow text-ink-400 mb-2.5">Acervo ({items.length})</p>
        <GridCatalog items={items}/>
      </div>
      <BottomNav/>
    </div>
  );
};

window.__CENA_P2__ = { ScreenSplash, ScreenLogin, ScreenHome, ScreenCategory, ScreenEqDetail, ScreenSearch, ScreenNotifications, ScreenHouse };
</script>

</body>
</html>
