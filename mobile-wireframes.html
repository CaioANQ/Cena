<style>
  html { background: #0a0908; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: #0a0908;
    color: #ece8de;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Grain overlay */
  .grain::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* Cine glow */
  .cine-glow {
    background: radial-gradient(80% 60% at 50% 0%, rgba(255,122,46,0.12), transparent 60%),
                radial-gradient(60% 50% at 100% 100%, rgba(232,196,104,0.06), transparent 60%);
  }

  /* Phone frame */
  .phone {
    position: relative;
    width: 300px;
    height: 620px;
    border-radius: 44px;
    background: #0a0908;
    padding: 11px;
    box-shadow:
      0 0 0 1px #2a2724,
      0 0 0 3px #17161430,
      0 40px 80px -20px rgba(0,0,0,0.8),
      0 0 60px -10px rgba(255,122,46,0.08);
  }
  .phone-inner {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 34px;
    overflow: hidden;
    background: #0a0908;
  }
  .phone-notch {
    position: absolute;
    top: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 26px;
    background: #000;
    border-radius: 20px;
    z-index: 30;
  }
  .phone-statusbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 26px 0 26px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    z-index: 20;
  }
  .phone-home-indicator {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 4px;
    background: #ffffff;
    border-radius: 4px;
    z-index: 20;
    opacity: 0.9;
  }
  .screen {
    position: absolute;
    inset: 0;
    padding-top: 44px;
    padding-bottom: 18px;
    overflow: hidden;
  }
  .screen-scroll {
    height: 100%;
    overflow: hidden;
  }

  /* Section decorative elements */
  .film-strip {
    height: 2px;
    background-image: linear-gradient(to right, transparent 0, transparent 4px, #ff7a2e 4px, #ff7a2e 12px, transparent 12px, transparent 20px);
    background-size: 20px 2px;
    opacity: 0.5;
  }

  .diaphragm-anim {
    animation: diaphragm 6s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes diaphragm {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(60deg) scale(0.92); }
  }

  /* Fade in on load */
  .fade-up {
    animation: fadeUp 0.8s ease-out backwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Hide scrollbars inside phones */
  .phone ::-webkit-scrollbar { display: none; }

  /* Focus glow */
  .callout-line {
    position: absolute;
    background: linear-gradient(to right, #ff7a2e80, transparent);
    height: 1px;
  }

  /* Sticky tick spinner */
  .pulse-dot {
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }
</style>

// Export to window for other script tags

<script type="text/babel" data-presets="env,react">
// ============================================================

const { Icon, BottomNav, StatusBadge, EqIcon } = window.__CENA_M_BASE__;

// ---------- 01. SPLASH ----------
const ScreenSplash = () => (
